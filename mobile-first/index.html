<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PromptHQ — Dashboard</title>
  <link rel="icon" href="../icon-01.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'StackSansText';
      src: url('../StackSansText-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-display: swap;
    }

    /* ========== RESET ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ========== TOKENS ========== */
    :root {
      --color-accent: #F82F02;
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius-card: 20px;
      --spacing-page: 20px;
      --spacing-card-gap: 16px;
    }

    /* ========== BASE ========== */
    html {
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-family);
      background: #000000;
      color: #ffffff;
      margin: 0;
      overflow: hidden;
    }

    /* ========== 3D CANVAS ========== */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      display: block;
      z-index: 0;
    }

    /* ========== APP OVERLAY ========== */
    #app {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .app-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 var(--spacing-page);
      padding-bottom: 60px;
    }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: calc(env(safe-area-inset-top, 0px) + 60px);
      padding-bottom: 28px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.5px;
      color: #ffffff;
    }

    .logo-3d-wrap {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4))
              drop-shadow(0 0 20px rgba(255, 255, 255, 0.15));
    }

    .logo-3d-wrap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ========== CARD LIST ========== */
    .card-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-card-gap);
    }

    /* ========== GLASS CARD ========== */
    .glass-card {
      border-radius: var(--radius-card);
      overflow: hidden;
      position: relative;
      opacity: 0;
      transform: translateY(20px);
    }

    /* Staggered entrance animations */
    .glass-card:nth-child(1) { animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.1s forwards; }
    .glass-card:nth-child(2) { animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards; }
    .glass-card:nth-child(3) { animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards; }
    .glass-card:nth-child(4) { animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.4s forwards; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Shine overlay */
    .glass-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      pointer-events: none;
      background: radial-gradient(
        ellipse at var(--shine-x, 50%) var(--shine-y, 50%),
        rgba(255,255,255,0.2) 0%,
        rgba(255,255,255,0) 60%
      );
      opacity: 0;
      transition: opacity 0.15s ease-out;
      z-index: 2;
    }

    /* ---- Dark glass ---- */
    .card--dark {
      background: rgba(28, 28, 30, 0.7);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    /* ---- Orange glass ---- */
    .card--orange {
      background: rgba(248, 47, 2, 0.35);
      backdrop-filter: blur(16px) saturate(1.4);
      -webkit-backdrop-filter: blur(16px) saturate(1.4);
      border: 1px solid rgba(248, 47, 2, 0.3);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      color: #ffffff;
    }

    /* ---- White glass ---- */
    .card--white {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      color: #ffffff;
    }

    /* ========== CARD CONTENT ========== */
    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      padding: 14px 20px;
      gap: 0;
    }

    .card-meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-meta-item:not(:first-child) {
      border-left: 1px solid rgba(255,255,255,0.15);
      padding-left: 16px;
    }

    .card--white .card-meta-item:not(:first-child) {
      border-left-color: rgba(255,255,255,0.2);
    }

    .card-meta-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      opacity: 0.6;
    }

    .card-meta-value {
      font-size: 15px;
      font-weight: 700;
    }

    .card-body {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 16px 20px 20px;
    }

    .card-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.5px;
      max-width: 70%;
    }

    .card-arrow {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .card-arrow:active {
      transform: scale(0.92);
    }

    .card-arrow svg {
      width: 20px;
      height: 20px;
    }

    /* Arrow variants */
    .card--dark .card-arrow {
      background: var(--color-accent);
    }
    .card--dark .card-arrow svg {
      stroke: #ffffff;
    }

    .card--orange .card-arrow {
      background: #ffffff;
    }
    .card--orange .card-arrow svg {
      stroke: #1C1C1E;
    }

    .card--white .card-arrow {
      background: var(--color-accent);
    }
    .card--white .card-arrow svg {
      stroke: #ffffff;
    }
  </style>
</head>

  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Mini 3D logo (top-right header) ──
    {
      const wrap = document.getElementById('logo-3d');
      const size = 156;
      const logoScene = new THREE.Scene();
      const logoCam = new THREE.PerspectiveCamera(40, 1, 0.01, 100);
      logoCam.position.set(0, 0, 5);
      logoCam.lookAt(0, 0, 0);

      const logoRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      logoRenderer.setSize(size, size);
      logoRenderer.setPixelRatio(1);
      logoRenderer.setClearColor(0x000000, 0);
      wrap.appendChild(logoRenderer.domElement);

      // Lighting — strong so white material is clearly visible
      logoScene.add(new THREE.AmbientLight(0xffffff, 1.2));
      const pl = new THREE.PointLight(0xffffff, 8, 30);
      pl.position.set(3, 3, 5);
      logoScene.add(pl);
      const pl2 = new THREE.PointLight(0xffffff, 4, 30);
      pl2.position.set(-3, -2, 4);
      logoScene.add(pl2);

      const whiteMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 0.2,
        metalness: 0.0,
        roughness: 0.4,
        side: THREE.DoubleSide,
      });

      const logoGroup = new THREE.Group();
      logoScene.add(logoGroup);

      let logoLoaded = false;
      new GLTFLoader().load('../logo_black.glb', (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const s = box.getSize(new THREE.Vector3());
        // Scale to fill the view — logo is wide text, so fit to width
        model.scale.setScalar(3.0 / Math.max(s.x, s.y, s.z));
        // Rotate to face camera (model is flat on XY, exported lying down)
        model.rotation.x = Math.PI / 2;
        // Re-center after rotation
        const center = new THREE.Box3().setFromObject(model).getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.traverse((c) => { if (c.isMesh) c.material = whiteMat; });
        logoGroup.add(model);
        logoLoaded = true;
      }, undefined, (err) => {
        console.error('Logo GLB load error:', err);
      });

      let logoStart = null;
      function animateLogo(ts) {
        requestAnimationFrame(animateLogo);
        if (!logoLoaded) return;
        if (!logoStart) logoStart = ts;
        const t = (ts - logoStart) * 0.001;
        // Slow continuous rotation
        logoGroup.rotation.z = t * 0.5;
        // Gentle float
        logoGroup.position.y = Math.sin(t * 0.8) * 0.05;
        logoRenderer.render(logoScene, logoCam);
      }
      requestAnimationFrame(animateLogo);
    }

    // ── Setup ──
    const maxDPR = 1.5;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, -1.4, 7);
    camera.lookAt(0, -1.4, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, maxDPR));
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      // Rebuild bloom RTs on resize
      rebuildBloomTargets();
    });

    // ── Noise texture (256x256 random RGBA via Canvas2D) ──
    const noiseCanvas = document.createElement('canvas');
    noiseCanvas.width = noiseCanvas.height = 256;
    const noiseCtx = noiseCanvas.getContext('2d');
    const noiseData = noiseCtx.createImageData(256, 256);
    for (let i = 0; i < noiseData.data.length; i++) {
      noiseData.data[i] = Math.random() * 255;
    }
    noiseCtx.putImageData(noiseData, 0, 0);
    const noiseTex = new THREE.CanvasTexture(noiseCanvas);
    noiseTex.wrapS = noiseTex.wrapT = THREE.RepeatWrapping;
    noiseTex.magFilter = THREE.NearestFilter;
    noiseTex.minFilter = THREE.NearestFilter;

    // ── Logo texture for tile overlay (white text on transparent) ──
    const logoCanvas = document.createElement('canvas');
    logoCanvas.width = 1024; logoCanvas.height = 256;
    const logoCtx = logoCanvas.getContext('2d');
    logoCtx.clearRect(0, 0, 1024, 256);
    logoCtx.fillStyle = '#ffffff';
    logoCtx.textAlign = 'center';
    logoCtx.textBaseline = 'middle';
    logoCtx.font = '700 180px StackSansText, system-ui, sans-serif';
    logoCtx.fillText('PromptHQ', 512, 128);
    const logoTileTex = new THREE.CanvasTexture(logoCanvas);
    logoTileTex.wrapS = logoTileTex.wrapT = THREE.RepeatWrapping;
    logoTileTex.minFilter = THREE.LinearFilter;

    // ── Quad-tree tiles ──
    function buildQuadTree(x, y, w, h, depth, maxDepth, tiles) {
      const splitProb = [0.5, 0.3, 0.15, 0.05];
      if (depth >= maxDepth || Math.random() > (splitProb[depth] || 0.1)) {
        tiles.push({ x, y, w, h });
        return;
      }
      const hw = w / 2, hh = h / 2;
      buildQuadTree(x,      y,      hw, hh, depth + 1, maxDepth, tiles);
      buildQuadTree(x + hw, y,      hw, hh, depth + 1, maxDepth, tiles);
      buildQuadTree(x,      y + hh, hw, hh, depth + 1, maxDepth, tiles);
      buildQuadTree(x + hw, y + hh, hw, hh, depth + 1, maxDepth, tiles);
    }

    // 6x4 base grid (reduced from 8x6 for mobile perf)
    const tiles = [];
    const baseCols = 6, baseRows = 4;
    for (let r = 0; r < baseRows; r++) {
      for (let c = 0; c < baseCols; c++) {
        buildQuadTree(c / baseCols, r / baseRows, 1 / baseCols, 1 / baseRows, 0, 2, tiles);
      }
    }

    // Build InstancedBufferGeometry
    const tileBox = new THREE.BoxGeometry(1, 1, 1);
    const tileGeo = new THREE.InstancedBufferGeometry();
    tileGeo.index = tileBox.index;
    tileGeo.attributes.position = tileBox.attributes.position;
    tileGeo.attributes.normal = tileBox.attributes.normal;
    tileGeo.attributes.uv = tileBox.attributes.uv;

    const instanceCount = tiles.length;
    const aPos = new Float32Array(instanceCount * 2);
    const aScale = new Float32Array(instanceCount * 2);
    const aRand = new Float32Array(instanceCount * 4);

    for (let i = 0; i < instanceCount; i++) {
      const t = tiles[i];
      aPos[i * 2]     = t.x + t.w * 0.5;
      aPos[i * 2 + 1] = t.y + t.h * 0.5;
      aScale[i * 2]     = t.w;
      aScale[i * 2 + 1] = t.h;
      aRand[i * 4]     = Math.random();
      aRand[i * 4 + 1] = Math.random();
      aRand[i * 4 + 2] = Math.random();
      aRand[i * 4 + 3] = Math.random();
    }

    tileGeo.setAttribute('aPos',   new THREE.InstancedBufferAttribute(aPos, 2));
    tileGeo.setAttribute('aScale', new THREE.InstancedBufferAttribute(aScale, 2));
    tileGeo.setAttribute('aRand',  new THREE.InstancedBufferAttribute(aRand, 4));
    tileGeo.instanceCount = instanceCount;

    // ── Tile vertex shader (cylindrical) ──
    const tileVertShader = /* glsl */`
      attribute vec2 aPos;
      attribute vec2 aScale;
      attribute vec4 aRand;

      uniform vec3 uScale;

      varying vec2 vUv;
      varying vec2 vGlobalUv;
      varying float vSideFace;
      varying vec4 vInstanceID;

      #define PI 3.14159265359

      void main() {
        vUv = uv;
        vInstanceID = aRand;

        vec3 localV = position;
        vSideFace = step(0.5, abs(normal.z));

        float gap = 0.92;
        float tileW = aScale.x * gap;
        float tileH = aScale.y * gap;
        float tileDepth = min(aScale.x, aScale.y) * 0.8;

        localV.x *= tileW;
        localV.y *= tileH;
        localV.z *= tileDepth;

        float uvX = aPos.x + localV.x - 0.5;
        float uvY = aPos.y + localV.y - 0.5;

        vGlobalUv = vec2(aPos.x + localV.x, aPos.y + localV.y);

        float theta = uvX * PI;
        float radius = uScale.x * 0.5;
        float depth = localV.z;

        vec3 pos = vec3(
          sin(theta) * (radius + depth),
          uvY * uScale.y * 1.5,
          -cos(theta) * (radius + depth)
        );

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    // ── Tile fragment shader (with logo overlay + flicker) ──
    const tileFragShader = /* glsl */`
      varying vec2 vUv;
      varying vec2 vGlobalUv;
      varying float vSideFace;
      varying vec4 vInstanceID;
      uniform sampler2D uNoiseTex;
      uniform sampler2D uLogoTex;
      uniform float uTime;

      void main() {
        // Animated noise UV
        vec2 noiseUv = vGlobalUv * 4.0 + vInstanceID.xy * 0.3;
        float scrollDir = step(0.5, vInstanceID.w);
        noiseUv.x += uTime * 0.08 * scrollDir * (vInstanceID.x - 0.5) * 2.0;
        noiseUv.y += uTime * 0.08 * (1.0 - scrollDir) * (vInstanceID.y - 0.5) * 2.0;

        vec4 noise = texture2D(uNoiseTex, noiseUv);

        float patternId = floor(vInstanceID.x * 3.0);

        vec3 faceColor = vec3(0.0);

        vec3 woodsmoke = vec3(0.973, 0.184, 0.008);
        vec3 scarlet   = vec3(1.0, 0.565, 0.329);

        if (patternId < 1.0) {
          faceColor.r += step(0.3, noise.x);
          faceColor.g += step(0.5, noise.y);
          faceColor.b += step(0.7, noise.z);
          faceColor *= woodsmoke;
        } else if (patternId < 2.0) {
          float w = fract(noise.w * 9.0);
          w = step(0.5, w);
          faceColor = mix(vec3(0.0), woodsmoke, w);
        } else {
          vec3 c = woodsmoke;
          c = mix(c, scarlet, step(0.5, noise.w));
          c = mix(c, woodsmoke * 1.2, step(0.7, noise.y));
          faceColor = c;
        }

        // Tile brightness
        faceColor *= 0.35 + vInstanceID.z * 0.15;

        // Logo overlay — 3 display modes spanning across tiles
        float logoMode = floor(vInstanceID.y * 3.0);
        vec2 logoUv = vec2(0.0);
        float aspect = 1024.0 / 256.0;

        if (logoMode < 1.0) {
          // Mode 0: Tiled scrolling — rows shift with sin()
          logoUv = vGlobalUv;
          logoUv -= 0.5;
          logoUv.y *= aspect;
          logoUv += 0.5;
          vec2 tileUv = logoUv * 2.0;
          tileUv.x += sin(floor(tileUv.y) * 3.0 + uTime * 0.5) * 0.15;
          logoUv = fract(tileUv) * 1.3;
        } else if (logoMode < 2.0) {
          // Mode 1: Single horizontal scroll
          logoUv = vGlobalUv;
          logoUv -= 0.5;
          logoUv.y *= aspect;
          logoUv *= 1.1;
          logoUv += 0.5;
          vec2 tileUv = logoUv;
          tileUv.x += uTime * 0.06;
          logoUv = fract(tileUv);
        } else {
          // Mode 2: Vertical scroll per instance
          logoUv = vUv;
          logoUv -= 0.5;
          logoUv.x /= aspect;
          logoUv += 0.5;
          logoUv.y -= uTime * 0.3 * vInstanceID.x;
          logoUv.y = fract(logoUv.y);
          logoUv -= 0.5;
          logoUv *= 1.3 + vInstanceID.z * 3.0;
          logoUv += 0.5;
          logoUv.x -= 0.38;
          if (logoUv.x > 0.24 || logoUv.x < 0.0 || logoUv.y > 1.0 || logoUv.y < 0.0) {
            logoUv = vec2(0.0);
          }
        }

        vec4 logo = texture2D(uLogoTex, logoUv);
        float logoW = step(0.5, logo.a) * step(0.0, logoUv.y) * step(logoUv.y, 1.0);
        // Flicker: per-tile random frequency + sin(uTime)
        float flicker = step(0.3, sin(uTime * (2.0 + vInstanceID.w * 8.0) + vInstanceID.x * 6.28));
        faceColor += logoW * 0.25 * flicker;

        // Per-tile vignette
        float tileVignette = smoothstep(1.9, 0.1, length((vUv - 0.5) * 2.0));
        faceColor *= tileVignette;

        // Side faces: fixed dark color (no fluid)
        vec3 sideColor = vec3(0.08, 0.09, 0.12);

        vec3 col = mix(sideColor, faceColor, vSideFace);

        // Halftone dots (CRT)
        float dotw = step(length(fract(vGlobalUv * 1800.0 * 0.23) - 0.5), 0.35);
        dotw = mix(dotw, 1.0, 0.5) * 0.9;
        col *= mix(1.0, dotw, vSideFace);

        // Global vignette
        col *= smoothstep(0.55, 0.05, length(vGlobalUv - 0.5));

        gl_FragColor = vec4(col, 1.0);
      }
    `;

    const tileMat = new THREE.ShaderMaterial({
      vertexShader: tileVertShader,
      fragmentShader: tileFragShader,
      uniforms: {
        uScale: { value: new THREE.Vector3(14, 10, 1) },
        uNoiseTex: { value: noiseTex },
        uLogoTex: { value: logoTileTex },
        uTime: { value: 0 },
      },
      side: THREE.DoubleSide,
    });

    scene.add(new THREE.Mesh(tileGeo, tileMat));

    // ── Crosshairs at tile intersections ──
    const cornerSet = new Set();
    const corners = [];
    for (const t of tiles) {
      const pts = [
        [t.x, t.y], [t.x + t.w, t.y],
        [t.x, t.y + t.h], [t.x + t.w, t.y + t.h],
      ];
      for (const [cx, cy] of pts) {
        const key = cx.toFixed(6) + ',' + cy.toFixed(6);
        if (!cornerSet.has(key)) {
          cornerSet.add(key);
          corners.push({ x: cx, y: cy });
        }
      }
    }

    const crossBase = new THREE.PlaneGeometry(1, 1);
    const crossGeo = new THREE.InstancedBufferGeometry();
    crossGeo.index = crossBase.index;
    crossGeo.attributes.position = crossBase.attributes.position;
    crossGeo.attributes.uv = crossBase.attributes.uv;
    crossGeo.attributes.normal = crossBase.attributes.normal;

    const crossPositions = new Float32Array(corners.length * 2);
    for (let i = 0; i < corners.length; i++) {
      crossPositions[i * 2] = corners[i].x;
      crossPositions[i * 2 + 1] = corners[i].y;
    }
    crossGeo.setAttribute('aCrossPos', new THREE.InstancedBufferAttribute(crossPositions, 2));
    crossGeo.instanceCount = corners.length;

    const crossVertShader = /* glsl */`
      attribute vec2 aCrossPos;
      uniform vec3 uScale;
      varying vec2 vUv;

      #define PI 3.14159265359

      mat2 rotate(float rad) {
        return mat2(cos(rad), sin(rad), -sin(rad), cos(rad));
      }

      void main() {
        vUv = uv;
        float uvX = aCrossPos.x - 0.5;
        float uvY = aCrossPos.y - 0.5;
        float theta = uvX * PI;
        float radius = uScale.x * 0.5;

        vec3 localPos = position * 0.15;
        localPos.xz *= rotate(-theta);

        vec3 cylPos = vec3(
          sin(theta) * radius,
          uvY * uScale.y * 1.5,
          -cos(theta) * radius
        );

        vec3 pos = cylPos + localPos;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const crossFragShader = /* glsl */`
      varying vec2 vUv;
      void main() {
        vec2 uv = vUv - 0.5;
        float armW = 0.03;
        float armL = 0.4;
        float crossH = step(abs(uv.y), armW) * step(abs(uv.x), armL);
        float crossV = step(abs(uv.x), armW) * step(abs(uv.y), armL);
        float cross = max(crossH, crossV);
        if (cross < 0.5) discard;
        gl_FragColor = vec4(1.0, 1.0, 1.0, 0.25);
      }
    `;

    scene.add(new THREE.Mesh(crossGeo, new THREE.ShaderMaterial({
      vertexShader: crossVertShader,
      fragmentShader: crossFragShader,
      uniforms: {
        uScale: { value: new THREE.Vector3(14, 10, 1) },
      },
      transparent: true,
      depthWrite: false,
      side: THREE.DoubleSide,
    })));

    // ── Lighting (simplified: ambient + 2 point lights) ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const l1 = new THREE.PointLight(0xffffff, 5, 20);
    l1.position.set(4, 4, 5);
    scene.add(l1);
    const l2 = new THREE.PointLight(0xffe0cc, 3, 20);
    l2.position.set(-5, -1, 4);
    scene.add(l2);

    // ── Bloom (simplified: 1 level) ──
    const fullscreenVertShader = /* glsl */`
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position.xy, 0.0, 1.0);
      }
    `;

    const bloomQuadGeo = new THREE.PlaneGeometry(2, 2);
    const bloomQuad = new THREE.Mesh(bloomQuadGeo);
    const bloomScene = new THREE.Scene();
    bloomScene.add(bloomQuad);
    const bloomOrtho = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

    let rtW, rtH, sceneRT, bloomBrightRT, bloom0H, bloom0V;

    function rebuildBloomTargets() {
      rtW = Math.floor(innerWidth * Math.min(devicePixelRatio, maxDPR));
      rtH = Math.floor(innerHeight * Math.min(devicePixelRatio, maxDPR));

      const sceneOpts = {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        format: THREE.RGBAFormat,
      };
      const bloomOpts = {
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter,
        format: THREE.RGBAFormat,
        type: THREE.HalfFloatType,
        depthBuffer: false,
        stencilBuffer: false,
      };

      if (sceneRT) sceneRT.dispose();
      if (bloomBrightRT) bloomBrightRT.dispose();
      if (bloom0H) bloom0H.dispose();
      if (bloom0V) bloom0V.dispose();

      sceneRT = new THREE.WebGLRenderTarget(rtW, rtH, sceneOpts);

      const bw = Math.floor(rtW / 4), bh = Math.floor(rtH / 4);
      bloomBrightRT = new THREE.WebGLRenderTarget(bw, bh, bloomOpts);
      bloom0H = new THREE.WebGLRenderTarget(bw, bh, bloomOpts);
      bloom0V = new THREE.WebGLRenderTarget(bw, bh, bloomOpts);
    }
    rebuildBloomTargets();

    // Bright extraction
    const bloomBrightMat = new THREE.ShaderMaterial({
      vertexShader: fullscreenVertShader,
      fragmentShader: /* glsl */`
        precision highp float;
        uniform sampler2D uSceneTex;
        uniform float uThreshold;
        varying vec2 vUv;
        void main() {
          vec4 c = texture2D(uSceneTex, vUv);
          vec3 f = max(vec3(0.0), c.rgb - uThreshold);
          gl_FragColor = vec4(c.rgb * f, 1.0);
        }
      `,
      uniforms: {
        uSceneTex: { value: null },
        uThreshold: { value: 0.35 },
      },
    });

    // Gaussian blur
    const bloomBlurMat = new THREE.ShaderMaterial({
      vertexShader: fullscreenVertShader,
      fragmentShader: /* glsl */`
        precision highp float;
        uniform sampler2D uBloomTex;
        uniform vec2 uResolution;
        uniform bool uIsVertical;
        varying vec2 vUv;
        void main() {
          float w0 = 0.227027, w1 = 0.1945946, w2 = 0.1216216, w3 = 0.054054, w4 = 0.016216;
          vec3 sum = w0 * texture2D(uBloomTex, vUv).rgb;
          vec2 d1 = (uIsVertical ? vec2(0.0, 1.0) : vec2(1.0, 0.0)) * 2.0;
          vec2 d2 = d1 * 2.0;
          vec2 d3 = d1 * 3.0;
          vec2 d4 = d1 * 4.0;
          sum += w1 * (texture2D(uBloomTex, vUv + d1 / uResolution).rgb + texture2D(uBloomTex, vUv - d1 / uResolution).rgb);
          sum += w2 * (texture2D(uBloomTex, vUv + d2 / uResolution).rgb + texture2D(uBloomTex, vUv - d2 / uResolution).rgb);
          sum += w3 * (texture2D(uBloomTex, vUv + d3 / uResolution).rgb + texture2D(uBloomTex, vUv - d3 / uResolution).rgb);
          sum += w4 * (texture2D(uBloomTex, vUv + d4 / uResolution).rgb + texture2D(uBloomTex, vUv - d4 / uResolution).rgb);
          gl_FragColor = vec4(sum, 1.0);
        }
      `,
      uniforms: {
        uBloomTex: { value: null },
        uResolution: { value: new THREE.Vector2() },
        uIsVertical: { value: false },
      },
    });

    // Composite: scene + bloom * 0.5
    const bloomCompositeMat = new THREE.ShaderMaterial({
      vertexShader: fullscreenVertShader,
      fragmentShader: /* glsl */`
        precision highp float;
        uniform sampler2D uSceneTex;
        uniform sampler2D uBloom0;
        varying vec2 vUv;
        void main() {
          vec3 col = texture2D(uSceneTex, vUv).rgb;
          col += texture2D(uBloom0, vUv).rgb * 0.5;
          col *= 1.5;
          gl_FragColor = vec4(col, 1.0);
        }
      `,
      uniforms: {
        uSceneTex: { value: null },
        uBloom0: { value: null },
      },
    });

    function runBloomPass(mat, target) {
      bloomQuad.material = mat;
      renderer.setRenderTarget(target);
      renderer.render(bloomScene, bloomOrtho);
    }

    // ── Animation loop ──
    let startTime = null;

    function animate(timestamp) {
      requestAnimationFrame(animate);
      if (!startTime) startTime = timestamp;
      const elapsed = (timestamp - startTime) * 0.001;

      tileMat.uniforms.uTime.value = elapsed;

      // Render scene to RT
      renderer.setRenderTarget(sceneRT);
      renderer.render(scene, camera);

      // Bloom: bright extraction
      bloomBrightMat.uniforms.uSceneTex.value = sceneRT.texture;
      runBloomPass(bloomBrightMat, bloomBrightRT);

      // Bloom: gaussian blur (1 level, H then V)
      const bw = Math.floor(rtW / 4), bh = Math.floor(rtH / 4);
      bloomBlurMat.uniforms.uBloomTex.value = bloomBrightRT.texture;
      bloomBlurMat.uniforms.uResolution.value.set(bw, bh);
      bloomBlurMat.uniforms.uIsVertical.value = false;
      runBloomPass(bloomBlurMat, bloom0H);

      bloomBlurMat.uniforms.uBloomTex.value = bloom0H.texture;
      bloomBlurMat.uniforms.uIsVertical.value = true;
      runBloomPass(bloomBlurMat, bloom0V);

      // Composite to screen
      bloomCompositeMat.uniforms.uSceneTex.value = sceneRT.texture;
      bloomCompositeMat.uniforms.uBloom0.value = bloom0V.texture;
      bloomQuad.material = bloomCompositeMat;
      renderer.setRenderTarget(null);
      renderer.render(bloomScene, bloomOrtho);
    }

    requestAnimationFrame(animate);
  </script>

</body>
